# Misc configs for Monza devboards that should be in defconfig

# Microchip EMC2305 and compatible EMC2301/2/3; needed for fan control
CONFIG_SENSORS_EMC2305=m
# Texas Instruments INA219 and compatibles; power monitoring
CONFIG_SENSORS_INA2XX=m
# NXP PCA9635 16-channel PWM LED controller (on-board RGB LEDs via CCI I2C)
CONFIG_LEDS_PCA963X=m
# Qualcomm QCA8081 2.5G Ethernet PHY (PHY ID 0x004dd101)
CONFIG_QCA808X_PHY=m
# Cypress CCGx USB Type-C PD controller (UCSI interface)
CONFIG_UCSI_CCG=m
# Analog Devices ADV7535 DSI-to-HDMI bridge
CONFIG_DRM_I2C_ADV7511=m
# HDMI audio output via ADV7535
CONFIG_DRM_I2C_ADV7511_AUDIO=y
# Maxim MAX98090/91 CODEC (analog audio playback and capture)
CONFIG_SND_SOC_MAX98090=m
# SC8280XP/QCS8275 ASoC sound card machine driver
CONFIG_SND_SOC_SC8280XP=m
# PCIe M.2 E-key connector power sequencing (WiFi/BT LGA module)
CONFIG_POWER_SEQUENCING_PCIE_M2=m
# support for USB CAN adapters for demos and testing
#
# this enables popular hardware like CANable, Candlelight and PEAK System
# PCAN-USB, supported by the slcan, gs_usb and peak_usb drivers respectively

# Serial / USB serial CAN Adaptors (slcan)
CONFIG_CAN_SLCAN=m
# Geschwister Schneider UG and candleLight compatible interfaces
CONFIG_CAN_GS_USB=m
# PEAK PCAN-USB/USB Pro interfaces for CAN 2.0b/CAN-FD
CONFIG_CAN_PEAK_USB=m
