#@TYPE: Machine
#@NAME: Radxa Dragon Q6A
#@DESCRIPTION: Machine configuration for Radxa Dragon Q6A, with QCS6490
#
# Boot architecture:
#   SPI NOR (Radxa-managed):  PBL -> XBL -> UEFI/EDK2 -> discovers ESP
#   SD/UFS/NVMe (Yocto-built): ESP (systemd-boot + UKI) + rootfs
#
# SPI NOR firmware is flashed separately via Radxa's edl-ng package.
# This machine conf only produces the OS disk image (ESP + rootfs).

require conf/machine/include/qcom-qcs6490.inc

MACHINE_FEATURES += "efi pci"

# ---------------------------------------------------------------------------
# Kernel / Device Tree
# ---------------------------------------------------------------------------
KERNEL_DEVICETREE = "qcom/qcs6490-radxa-dragon-q6a.dtb"

PREFERRED_PROVIDER_virtual/kernel ?= "linux-qcom-next"

# ---------------------------------------------------------------------------
# Boot firmware: NOT managed by Yocto
# ---------------------------------------------------------------------------
# SPI NOR contents (XBL, UEFI, TZ, HYP, DEVCFG, AOP, CDT) are provided
# by Radxa and flashed independently. Blank these out so the qcomflash
# class doesn't try to package or depend on Qualcomm boot firmware.
QCOM_BOOT_FIRMWARE = ""
QCOM_BOOT_FILES_SUBDIR = ""
QCOM_PARTITION_FILES_SUBDIR = ""
QCOM_PARTITION_FILES_SUBDIR_SPINOR = ""
QCOM_PARTITION_CONF = ""
QCOM_CDT_FILE = ""

# ---------------------------------------------------------------------------
# Bootloader: Radxa EDK2 in SPI NOR — no U-Boot needed
# ---------------------------------------------------------------------------
# Do NOT set PREFERRED_PROVIDER_virtual/bootloader.
# The qcomflash class defaults to uefi.elf from QCOM_BOOT_FILES_SUBDIR,
# which is empty, so it's a no-op.

# ---------------------------------------------------------------------------
# EFI System Partition + UKI boot
# ---------------------------------------------------------------------------
# Use the canned UEFI UKI WKS — it creates the ESP inline via the
# bootimg_efi plugin (systemd-boot + UKI) with correct GPT type GUID.
# No need for the standalone esp-qcom-image recipe.
WKS_FILE = "efi-uki-bootdisk.wks.in"
QCOM_ESP_IMAGE = ""

# SD card uses 512-byte sectors; override to 4096 for UFS targets
QCOM_VFAT_SECTOR_SIZE ?= "512"

# Root device identifier for the UKI kernel cmdline
QCOM_BOOTIMG_ROOTFS ?= "PARTLABEL=root"
QCOM_DTB_DEFAULT ?= "qcs6490-radxa-dragon-q6a"
# ---------------------------------------------------------------------------
# Image output
# ---------------------------------------------------------------------------
IMAGE_FSTYPES += "wic wic.gz wic.bmap"

# ---------------------------------------------------------------------------
# Firmware packages
# ---------------------------------------------------------------------------
MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-qcom-boot-essential \
    packagegroup-machine-essential-qcom-qcs6490-soc \
    packagegroup-radxa-dragon-q6a-firmware \
    packagegroup-radxa-dragon-q6a-hexagon-dsp-binaries \
    qairt-sdk-hexagon-v68 \
"
