#@TYPE: Machine
#@NAME: Arduino VENTUNO Q
#@DESCRIPTION: Machine configuration for Arduino VENTUNO Q

PREFERRED_PROVIDER_virtual/kernel ?= "linux-qcom-next"

require conf/machine/include/qcom-qcs8300.inc

MACHINE_FEATURES += "efi pci tpm2 alsa wifi bluetooth"

QCOM_DTB_DEFAULT ?= "monaco-arduino-monza"

KERNEL_DEVICETREE ?= " \
                      qcom/monaco-arduino-monza.dtb \
                      "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-ventuno-q-firmware \
    packagegroup-ventuno-q-hexagon-dsp-binaries \
    qairt-sdk-hexagon-v75 \
    qcom-fastcv-binaries-qcs8300-ride-dsp \
"

QCOM_CDT_FILE = "cdt_qcs8275-Monza"
QCOM_BOOT_FILES_SUBDIR = "qcs8275-arduino-monza"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/qcs8275-monza/emmc"

QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-qcs8275-arduino-monza"
